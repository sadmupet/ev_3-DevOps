name: CI/CD Tienda de Perritos - EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: devopseks
  K8S_NAMESPACE: tienda
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_DB: tienda-db

jobs:
  build-test-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Requerido para AWS Academy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: npm install --production

      - name: Test backend (chequeo de sintaxis)
        working-directory: ./backend
        run: npm test

      - name: Build & Push Backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_BACKEND:${{ github.sha }} -t $REGISTRY/$ECR_REPO_BACKEND:eks-v1 ./backend
          docker push $REGISTRY/$ECR_REPO_BACKEND:${{ github.sha }}
          docker push $REGISTRY/$ECR_REPO_BACKEND:eks-v1

      - name: Build & Push Frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_FRONTEND:${{ github.sha }} -t $REGISTRY/$ECR_REPO_FRONTEND:eks-v1 ./frontend
          docker push $REGISTRY/$ECR_REPO_FRONTEND:${{ github.sha }}
          docker push $REGISTRY/$ECR_REPO_FRONTEND:eks-v1

      - name: Build & Push DB
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_DB:${{ github.sha }} -t $REGISTRY/$ECR_REPO_DB:eks-v1 ./db
          docker push $REGISTRY/$ECR_REPO_DB:${{ github.sha }}
          docker push $REGISTRY/$ECR_REPO_DB:eks-v1

  deploy:
    name: Deploy a EKS
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR (para obtener el registry URL)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar kubectl contra el clúster EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Aplicar namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Crear/actualizar secreto de MySQL desde GitHub Secrets
        run: |
          kubectl create secret generic mysql-secret \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=MYSQL_ROOT_PASSWORD='${{ secrets.DB_ROOT_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Reemplazar {{ECR_URL}} en los manifiestos
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          find ./k8s -type f -name "*.yaml" -exec sed -i "s|{{ECR_URL}}|$REGISTRY|g" {} \;
          find ./k8s -type f -name "*.yaml" -exec sed -i "s|:eks-v1|:${{ github.sha }}|g" {} \;

      - name: Desplegar MySQL
        run: |
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          kubectl rollout status deployment/tienda-db -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Desplegar Backend
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl rollout status deployment/tienda-backend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Desplegar Frontend
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-hpa.yaml
          kubectl rollout status deployment/tienda-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Mostrar estado y endpoint público
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          kubectl get svc tienda-frontend -n ${{ env.K8S_NAMESPACE }}
