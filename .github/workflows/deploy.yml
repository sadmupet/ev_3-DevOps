name: CI/CD Innovatech

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO_BACKEND: greenbite-backend
  ECR_REPO_FRONTEND: greenbite-frontend
  ECS_CLUSTER: Innovatech-Cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Requerido para AWS Academy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:${{ github.sha }} ./backend
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:latest ./backend
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:${{ github.sha }}
          docker push ${{ secrets.AWS_ACCESS_KEY_ID == '' && steps.login-ecr.outputs.registry || steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:latest

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:${{ github.sha }} ./frontend
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:latest ./frontend
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:latest

      - name: Desplegar Backend en ECS
        run: aws ecs update-service --cluster $ECS_CLUSTER --service backend-svc --force-new-deployment

      - name: Desplegar Frontend en ECS
        run: aws ecs update-service --cluster $ECS_CLUSTER --service frontend-svc --force-new-deployment

      - name: Esperar Estabilidad del Clúster
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services backend-svc frontend-svc